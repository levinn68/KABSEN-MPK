<body data-page="anggota">
  <div class="app-shell compact-shell">
    <aside class="sidebar">
      <a href="./dashboard.html" class="brand brand-logo-lockup"><img src="./assets/img/mpk-zone-mark.svg" alt="Logo MPK Zone" class="brand-image"><div><strong>MPK ZONE</strong><small>SMP Tunas Harapan</small></div></a>
      <nav class="sidebar-nav">

</nav>
    </aside>
    <main class="main-content">
      <header class="page-header compact-page-header">
        <div>
          <p class="eyebrow">Anggota MPK</p>
          <h1>Data anggota aktif MPK ZONE</h1>
          <p class="subtitle">Cari anggota dengan cepat, lihat jabatan, status kas mingguan, dan ketersediaan profil wajah dalam satu halaman.</p>
        </div>
      </header>
      <section class="toolbar-panel">
        <div class="search-box"><input type="search" id="memberSearchInput" placeholder="Cari nama atau jabatan..." /></div>
        <div class="filters-inline">
          <select id="memberActiveFilter"><option value="active">Status aktif</option><option value="all">Semua status</option><option value="inactive">Nonaktif</option></select>
          <select id="memberSortFilter"><option value="az">Urutkan A-Z</option><option value="za">Urutkan Z-A</option></select>
        </div>
      </section>
      <section class="member-grid" id="memberGrid"></section>
      <section class="panel">
        <div class="panel-head"><div><p class="eyebrow">Tabel Lengkap</p><h3>Daftar anggota MPK</h3></div></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Nama</th><th>Jabatan</th><th>Status Kas</th><th>Wajah</th><th>Profil</th></tr></thead>
            <tbody id="memberTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
